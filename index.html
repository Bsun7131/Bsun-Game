    <!DOCTYPE html>
<html>
<head>
  <title>Catch Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      overflow: hidden;
      touch-action: auto;
    }

    h1 {
      font-size: 24px;
      margin: 10px 0 5px;
    }

    p {
      margin: 5px;
    }

    canvas {
      background: #111;
      border: 3px solid white;
      max-width: 95vw;
      max-height: 70vh;
    }

    .buttons {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      font-size: 26px;
      padding: 12px 30px;
      border-radius: 12px;
      border: none;
      background: #00c853;
      color: white;
    }

    #restartBtn {
      display: none;
      background: orange;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>Catch the Falling Blocks</h1>
  <p>PC: Use ← → keys | Phone: Use buttons</p>
  <p>Score: <span id="score">0</span></p>

  <canvas id="game" width="400" height="500"></canvas>

  <br>
  <button id="restartBtn">Restart</button>

  <div class="buttons">
    <button id="leftBtn">⬅️</button>
    <button id="rightBtn">➡️</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("score");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const restartBtn = document.getElementById("restartBtn");

    let score = 0;
    let gameOver = false;
    let moveLeft = false;
    let moveRight = false;

    const player = {
      x: 170,
      y: 460,
      width: 60,
      height: 20,
      speed: 7
    };

    const block = {
      x: Math.random() * 360,
      y: 0,
      width: 40,
      height: 40,
      speed: 4
    };

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowLeft") moveLeft = true;
      if (event.key === "ArrowRight") moveRight = true;
    });

    document.addEventListener("keyup", function(event) {
      if (event.key === "ArrowLeft") moveLeft = false;
      if (event.key === "ArrowRight") moveRight = false;
    });

    leftBtn.addEventListener("touchstart", function(e) {
      e.preventDefault();
      moveLeft = true;
    });

    leftBtn.addEventListener("touchend", function(e) {
      e.preventDefault();
      moveLeft = false;
    });

    rightBtn.addEventListener("touchstart", function(e) {
      e.preventDefault();
      moveRight = true;
    });

    rightBtn.addEventListener("touchend", function(e) {
      e.preventDefault();
      moveRight = false;
    });

    leftBtn.addEventListener("mousedown", () => moveLeft = true);
    leftBtn.addEventListener("mouseup", () => moveLeft = false);

    rightBtn.addEventListener("mousedown", () => moveRight = true);
    rightBtn.addEventListener("mouseup", () => moveRight = false);

    restartBtn.addEventListener("click", restartGame);

    function drawPlayer() {
      ctx.fillStyle = "lime";
      ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    function drawBlock() {
      ctx.fillStyle = "red";
      ctx.fillRect(block.x, block.y, block.width, block.height);
    }

    function movePlayer() {
      if (moveLeft && player.x > 0) player.x -= player.speed;
      if (moveRight && player.x + player.width < canvas.width) player.x += player.speed;
    }

    function moveBlock() {
      block.y += block.speed;

      if (
        block.y + block.height >= player.y &&
        block.x < player.x + player.width &&
        block.x + block.width > player.x
      ) {
        score++;
        scoreText.textContent = score;
        resetBlock();
      }

      if (block.y > canvas.height) {
        gameOver = true;
        restartBtn.style.display = "inline-block";
      }
    }

    function resetBlock() {
      block.x = Math.random() * (canvas.width - block.width);
      block.y = 0;
      block.speed += 0.3;
    }

    function drawGameOver() {
      ctx.fillStyle = "white";
      ctx.font = "32px Arial";
      ctx.fillText("Game Over", 115, 240);
    }

    function restartGame() {
      score = 0;
      scoreText.textContent = score;
      gameOver = false;
      moveLeft = false;
      moveRight = false;

      player.x = 170;
      player.y = 460;

      block.x = Math.random() * (canvas.width - block.width);
      block.y = 0;
      block.speed = 4;

      restartBtn.style.display = "none";
      gameLoop();
    }

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!gameOver) {
        movePlayer();
        moveBlock();
        drawPlayer();
        drawBlock();
        requestAnimationFrame(gameLoop);
      } else {
        drawGameOver();
      }
    }

    gameLoop();
  </script>

</body>
</html>
